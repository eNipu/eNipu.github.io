name: Build, scan, and deploy al-am.in to OCI

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

concurrency:
  group: deploy-oci
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate repo (secret scan + HTML)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (fail on any leaked secret)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .github/gitleaks.toml

      - name: HTML sanity check
        run: |
          set -e
          test -f index.html
          test -f 404.html
          test -f hire/index.html
          test -f photography/index.html
          test -f robots.txt
          test -f sitemap.xml
          echo "Static site layout looks good."

  build-and-push:
    name: Build & push multi-arch image to GHCR
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to OCI VM
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://al-am.in/
    steps:
      - name: Trigger update on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_SSH_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e
            cd /srv/site
            ./update.sh

      - name: Smoke test
        run: |
          set -e
          for i in 1 2 3 4 5; do
            if curl -fsS -o /dev/null -w "%{http_code}\n" https://al-am.in/ | grep -q 200; then
              echo "Site is live."
              exit 0
            fi
            echo "Attempt $i: site not ready yet, sleeping..."
            sleep 10
          done
          echo "Site did not return 200 after deploy."
          exit 1
