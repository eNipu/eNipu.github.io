<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="/styles.css">
  <style>
    .not-found {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--s-8) var(--s-5);
    }
    .not-found-code {
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--s-4);
    }
    .not-found h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      margin-bottom: var(--s-4);
      letter-spacing: -0.03em;
    }
    .not-found p {
      color: var(--color-text-muted);
      max-width: 42ch;
      margin: 0 auto var(--s-6);
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div class="logo">
          <a href="/">Khandaker Md. Al-Amin</a>
        </div>
        <ul class="nav-links" id="navLinks">
          <li><a href="/#about">About</a></li>
          <li><a href="/projects/">Projects</a></li>
          <li><a href="/publications/">Publications</a></li>
          <li><a href="/blog/">Writing</a></li>
          <li><a href="/photography/">Photography</a></li>
          <li class="theme-toggle">
            <button id="themeToggle" aria-label="Toggle dark/light mode">
              <i class="fas fa-moon"></i>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="not-found">
      <div>
        <div class="not-found-code">Error 404</div>
        <h1>Page not found</h1>
        <p>The page you are looking for has moved, been renamed, or never existed.</p>
        <a href="/" class="btn btn-primary">Return Home</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-info">
          <p>&copy; 2025 Khandaker Md. Al-Amin</p>
        </div>
        <div class="footer-links">
          <a href="https://github.com/eNipu" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://www.linkedin.com/in/khandakermd/" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>

</html>
