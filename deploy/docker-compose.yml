name: al-am-in

# This stack is designed to SHARE the existing host-level Caddy
# (e.g. `caddy-staging`) that already owns ports 80/443 on the Oracle VM.
# We do NOT publish any host ports here. The edge Caddy must be attached
# to the external `web-edge` network and must have a site block for
# al-am.in that reverse-proxies to the `al-am-in-web` container.
#
# Create the shared network once on the VM:
#     docker network create web-edge
#
# Then connect the existing Caddy to it (idempotent):
#     docker network connect web-edge caddy-staging || true

services:
  web:
    image: ${SITE_IMAGE}
    container_name: al-am-in-web
    pull_policy: always
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - web-edge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  web-edge:
    external: true
