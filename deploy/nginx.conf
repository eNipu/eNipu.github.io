worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;

    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf;

    map $sent_http_content_type $cache_control_value {
        default                                   "public, max-age=300";
        ~*text/html                               "public, max-age=0, must-revalidate";
        ~*font/                                   "public, max-age=31536000, immutable";
        ~*image/                                  "public, max-age=604800";
        ~*text/css                                "public, max-age=604800";
        ~*application/javascript                  "public, max-age=604800";
    }

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control $cache_control_value always;

        # Health endpoint (used by Docker healthcheck and Caddy upstream probe)
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Pretty URLs: try file, directory index, then 404 page
        location / {
            try_files $uri $uri/ $uri.html $uri/index.html =404;
        }

        # Never serve hidden / server-only files
        location ~ /\.(?!well-known) { deny all; }
        location ~* /(server\.js|package\.json|package-lock\.json|CLAUDE\.md|Dockerfile|Caddyfile|docker-compose\.ya?ml)$ {
            deny all;
        }

        error_page 404 /404.html;
        location = /404.html { internal; }
    }
}
